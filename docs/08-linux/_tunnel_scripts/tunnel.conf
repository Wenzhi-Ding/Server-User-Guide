# /etc/autossh/tunnel.conf — systemd 模板实例的环境变量
# =========================================================
# 修改此文件后需 restart 所有实例: systemctl restart polyu-tunnel@*

RELAY_HOST=8.218.122.123
RELAY_PORT=22
RELAY_USER=tunnel

# 反向隧道绑定地址 — 保持空，用 ProxyJump 模式
BIND_PREFIX=

# 管理密钥用于以 root 身份 SSH 到中转服务器，
# 推送/删除 tunnel 用户的 authorized_keys 条目
RELAY_MGMT_USER=root
MGMT_KEY=/etc/autossh/management_key
